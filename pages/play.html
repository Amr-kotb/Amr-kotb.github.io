<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>page 2</title>
    <style>
        /* Stile generale */
        body, html {
            margin: 0;
            padding: 0;
            font-family: 'Arial', sans-serif;
            color: white;
            overflow: hidden;
        }

        /* Sfondo con immagine */
        body {
            background: url(/img/cod\ 2.jpg) no-repeat center center fixed;
            background-size: cover;
        }

        /* Overlay scuro */
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            z-index: 1;
        }

        /* Contenitore principale */
        .container {
            position: relative;
            z-index: 2;
            text-align: center;
            padding-top:15%;
            margin: 20px;
        }

        /* Titolo animato */
        .title {
            font-size: 4em;
            letter-spacing: 2px;
            font-weight: bold;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.8);
        }

        .changing-text {
            display: inline-block;
            color: #f1b21f;
            animation: changeText 8s infinite;
        }

       
        }

        /* Pulsanti */
        .btn {
            display: inline-block;
            text-decoration: none;
            background: #c30e0e;
            color: white;
            padding: 15px 30px;
            border-radius: 5px;
            font-size: 1.2em;
            margin: 20px 10px;
            transition: background 0.3s ease;
        }

        .btn:hover {
            background: #8b0b0b;
        }

        /* Effetto lampeggiante */
        .btn-glow {
            box-shadow: 0 0 20px #c30e0e;
            animation: glow 1.5s infinite alternate;
        }

        @keyframes glow {
            0% { box-shadow: 0 0 20px #000000; }
            100% { box-shadow: 0 0 45px #c30e0e; }
        }
    </style>
</head>
<body>
    <!-- Overlay scuro -->
    <div class="overlay"></div>

    <!-- Contenitore principale -->
    <div class="container">
        <h1 class="title">Welcome to <span class="changing-text">Call of Duty</span></h1>
        <p>The ultimate gaming experience awaits you.</p>
        <a href="/pages/play.html" class="btn btn-glow">Play Now</a>
        <a href="#community" class="btn">Join Community</a>
    </div>
</body>
</html>
