<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Dragon Animation</title>
    <style>
        body {
            margin: 0;
            background: #500b0b;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        
    </style>
</head>
<body>
    <svg id="canvas" width="800" height="600"></svg>
    <script>
        // Configurazione iniziale
        const svg = document.getElementById("canvas");
        const elems = [];
        const pointer = { x: 400, y: 300 }; // Posizione centrale iniziale
        const rad = 1500;
        let frm = 232; // Velocità di animazione
        const width = svg.clientWidth;
        const height = svg.clientHeight;
        const N = 15; 

        
        svg.addEventListener("mousemove", (event) => {
            const rect = svg.getBoundingClientRect();
            pointer.x = event.clientX - rect.left; 
            pointer.y = event.clientY - rect.top;
        });

        // Funzione per creare un drago SVG
        const createDragon = (x, y, scale) => {
            const g = document.createElementNS("http://www.w3.org/2000/svg", "g");
            g.setAttribute("transform", `translate(${x}, ${y}) scale(${scale})`);

            const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
            path.setAttribute(
                "d",
                "M10 10 L20 0 L30 10 L25 20 L15 20 Z M15 15 L20 5 L25 15 Z"
            ); 
            path.setAttribute("fill", "hsl(200, 70%, 50%)");

            g.appendChild(path);
            return g;
        };

        
        for (let i = 0; i < N; i++) {
            const dragon = createDragon(400, 300, 1 - i * 0.1);
            svg.appendChild(dragon);
            elems.push({ x: 400, y: 300, use: dragon });
        }

        const run = () => {
            requestAnimationFrame(run);
            frm += 0.02; 
            let e = elems[0];
            const ax = (Math.cos(3 * frm) * rad * width) / height;
            const ay = (Math.sin(4 * frm) * rad * height) / width;
            e.x += (ax + pointer.x - e.x) / 10;
            e.y += (ay + pointer.y - e.y) / 10;
            for (let i = 1; i < N; i++) {
                let e = elems[i];
                let ep = elems[i - 1];
                const a = Math.atan2(e.y - ep.y, e.x - ep.x);
                e.x += (ep.x - e.x + (Math.cos(a) * (100 - i)) / 5) / 4;
                e.y += (ep.y - e.y + (Math.sin(a) * (100 - i)) / 5) / 4;
                const s = 1 - i * 0.1;
                e.use.setAttribute(
                    "transform",
                    `translate(${(ep.x + e.x) / 2},${(ep.y + e.y) / 2}) rotate(${
                        (180 / Math.PI) * a
                    }) scale(${s})`
                );
            }
        };

        // Avvia l'animazione
        run();
    </script>
</body>
</html>
