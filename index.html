<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Call of Duty Gaming</title>
    <style>
        /* Stile generale */
        body, html {
            margin: 0;
            padding: 0;
            font-family: 'Arial', sans-serif;
            color: white;
            overflow: hidden;
        }

        /* Sfondo con immagine */
        body {
            background: url('https://images.unsplash.com/photo-1580771912848-485aae3cc7b6?auto=format&fit=crop&w=1920&q=80') no-repeat center center fixed;
            background-size: cover;
        }

        /* Overlay scuro */
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            z-index: 1;
        }

        /* Contenitore principale */
        .container {
            position: relative;
            z-index: 2;
            text-align: center;
            padding-top: 20%;
        }

        /* Titolo animato */
        .title {
            font-size: 4em;
            letter-spacing: 2px;
            font-weight: bold;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.8);
        }

        .changing-text {
            display: inline-block;
            color: #1f8ef1;
            animation: changeText 8s infinite;
        }

        @keyframes changeText {
            0%, 25% { content: "Call of Duty"; }
            26%, 50% { content: "Gaming Hub"; }
            51%, 75% { content: "Warzone Arena"; }
            76%, 100% { content: "Victory Awaits"; }
        }

        /* Pulsanti */
        .btn {
            display: inline-block;
            text-decoration: none;
            background: #1f8ef1;
            color: white;
            padding: 15px 30px;
            border-radius: 5px;
            font-size: 1.2em;
            margin: 20px 10px;
            transition: background 0.3s ease;
        }

        .btn:hover {
            background: #0056b3;
        }

        /* Effetto lampeggiante */
        .btn-glow {
            box-shadow: 0 0 20px #1f8ef1;
            animation: glow 1.5s infinite alternate;
        }

        @keyframes glow {
            0% { box-shadow: 0 0 10px #1f8ef1; }
            100% { box-shadow: 0 0 30px #1f8ef1; }
        }
    </style>
</head>
<body>
    <!-- Overlay scuro -->
    <div class="overlay"></div>

    <!-- Contenitore principale -->
    <div class="container">
        <h1 class="title">Welcome to <span class="changing-text">Call of Duty</span></h1>
        <p>The ultimate gaming experience awaits you.</p>
        <a href="#play" class="btn btn-glow">Play Now</a>
        <a href="#community" class="btn">Join Community</a>
    </div>
</body>
</html>
