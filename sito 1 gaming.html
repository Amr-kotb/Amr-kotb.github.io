<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sito da Gaming</title>
    <style>
        /* Stile generale */
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #1a1a1a;
            color: white;
        }

        /* Header */
        header {
            background-color: #ff0000;
            padding: 20px;
            text-align: center;
        }

        header h1 {
            margin: 0;
            color: #000;
            font-size: 2.5em;
            text-transform: uppercase;
        }

        /* Navigazione */
        nav {
            background-color: #000;
            display: flex;
            justify-content: center;
            padding: 10px 0;
        }

        nav a {
            color: #ff0000;
            text-decoration: none;
            margin: 0 15px;
            font-weight: bold;
            text-transform: uppercase;
        }

        nav a:hover {
            color: #fff;
        }

        /* Contenuto principale */
        .main-content {
            padding: 20px;
            text-align: center;
        }

        .game-card {
            background-color: #292929;
            border: 2px solid #ff0000;
            border-radius: 10px;
            display: inline-block;
            margin: 15px;
            padding: 20px;
            width: 250px;
            text-align: left;
        }

        .game-card img {
            width: 100%;
            border-radius: 10px;
        }

        .game-card h2 {
            font-size: 1.5em;
            color: #ff0000;
        }

        /* Footer */
        footer {
            background-color: #000;
            color: #ff0000;
            text-align: center;
            padding: 10px 0;
            margin-top: 20px;
        }
    </style>
</head>
<body>

    <header>
        <h1>Gaming Zone</h1>
    </header>

    <nav>
        <a href="#home">Home</a>
        <a href="#games">Giochi</a>
        <a href="#about">Chi Siamo</a>
        <a href="#contact">Contattaci</a>
    </nav>

    <div class="main-content" id="games">
        <h2>I Nostri Giochi</h2>
        <div class="game-card">
            <img src="https://via.placeholder.com/250x150" alt="Gioco 1">
            <h2>Gioco 1</h2>
            <p>Descrizione breve del gioco. Scopri di più!</p>
        </div>
        <div class="game-card">
            <img src="https://via.placeholder.com/250x150" alt="Gioco 2">
            <h2>Gioco 2</h2>
            <p>Descrizione breve del gioco. Scopri di più!</p>
        </div>
        <div class="game-card">
            <img src="https://via.placeholder.com/250x150" alt="Gioco 3">
            <h2>Gioco 3</h2>
            <p>Descrizione breve del gioco. Scopri di più!</p>
        </div>
    </div>

    <footer>
        <p>&copy; 2024 Gaming Zone - Tutti i diritti riservati.</p>
    </footer>

</body>
</html>
